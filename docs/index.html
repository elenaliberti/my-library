<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#6366f1">
<title>My Library</title>
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f8f7ff;--card:#fff;--card2:#f3f0ff;
  --border:#e8e3ff;--border2:#ebebf0;
  --text:#1e1b4b;--text2:#374151;--muted:#7c7a9a;
  --accent:#6366f1;--accent2:#4f46e5;--surface:#ede9fe;
  --shadow:0 1px 6px rgba(0,0,0,.05),0 3px 14px rgba(99,102,241,.07);
  --safe-top:env(safe-area-inset-top);
  --safe-bottom:env(safe-area-inset-bottom);
  /* nav only needs ~home-indicator clearance, not the full inset — trim it to cut bottom whitespace */
  --nav-inset:max(calc(env(safe-area-inset-bottom) - 16px), 2px);
  --nav-h:54px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;overflow:hidden}
/* the bottom nav is white; make anything showing behind/below it white too so no gap is visible */
html{background:#fff}

/* ── Setup ── */
#setup{position:fixed;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:32px;background:linear-gradient(160deg,#ede9fe 0%,#fff 55%,#fdf4ff 100%);z-index:1000;gap:14px;text-align:center}
#setup.hidden{display:none}
.s-icon{font-size:64px;filter:drop-shadow(0 8px 16px rgba(99,102,241,.3))}
.s-title{font-size:32px;font-weight:900;color:var(--text);letter-spacing:-.5px}
.s-title em{font-style:normal;color:var(--accent)}
.s-sub{color:var(--muted);font-size:14px;line-height:1.6;max-width:300px}
.s-input{width:100%;padding:15px 16px;background:#fff;border:2px solid var(--border);border-radius:14px;color:var(--text);font-size:13px;font-family:monospace;text-align:center;outline:none;letter-spacing:.5px;box-shadow:var(--shadow)}
.s-input:focus{border-color:var(--accent)}
.s-btn{width:100%;padding:17px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 8px 20px rgba(99,102,241,.35)}
.s-note{font-size:11px;color:var(--muted);line-height:1.7;max-width:280px}
.s-link{color:var(--accent);text-decoration:none;font-weight:600}
#setup-err{color:#b91c1c;font-size:13px;font-weight:600;display:none;background:#fef2f2;padding:9px 14px;border-radius:10px;width:100%;text-align:center}

/* ── App shell ── */
#app{position:fixed;top:0;left:0;right:0;bottom:calc(var(--nav-h) + var(--nav-inset));display:flex;flex-direction:column;overflow:hidden}
#app.hidden{display:none}

/* ── Header ── */
#hdr{padding:calc(var(--safe-top) + 12px) 16px 10px;background:rgba(248,247,255,.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);flex-shrink:0}
.hdr-title{font-size:20px;font-weight:900;flex:1;color:var(--text);letter-spacing:-.3px}
.hdr-title em{font-style:normal;color:var(--accent)}
.ico-btn{width:36px;height:36px;background:var(--surface);border:none;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;flex-shrink:0;color:var(--accent2)}
.ico-btn:active{opacity:.6}

/* ── Status pills ── */
#stat-row{display:flex;gap:6px;padding:8px 16px 4px;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
#stat-row::-webkit-scrollbar{display:none}
.spill{display:flex;flex-direction:column;align-items:center;background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:7px 10px;cursor:pointer;flex-shrink:0;min-width:54px;transition:all .15s;box-shadow:var(--shadow)}
.spill:active{opacity:.7;transform:scale(.97)}
.spill.on-TBR{background:#f5f3ff;border-color:#8b5cf6}
.spill.on-Reading{background:#eff6ff;border-color:#60a5fa}
.spill.on-Finished{background:#f0fdf4;border-color:#4ade80}
.spill.on-Paused{background:#fffbeb;border-color:#fbbf24}
.spill.on-DNF{background:#fff1f2;border-color:#f87171}
.spill-num{font-size:17px;font-weight:800;line-height:1;color:var(--text)}
.spill-lbl{font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.3px;margin-top:2px}
.spill-words{font-size:11px;color:var(--muted);font-weight:600;margin-left:auto;white-space:nowrap;align-self:center;padding:4px 9px;background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.04)}

/* ── Search + sort ── */
#search-sort{display:flex;gap:8px;padding:6px 16px;flex-shrink:0}
.search-in{flex:1;padding:10px 14px;background:#fff;border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-size:14px;outline:none;-webkit-appearance:none;box-shadow:var(--shadow)}
.search-in:focus{border-color:var(--accent)}
.search-in::placeholder{color:var(--muted)}
.sort-sel{padding:10px 10px;background:#fff;border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-size:12px;font-weight:600;outline:none;-webkit-appearance:none;cursor:pointer;box-shadow:var(--shadow)}
.sort-sel option{background:#fff;color:var(--text)}

/* ── Filter chips ── */
#chips{display:flex;gap:6px;padding:2px 16px 6px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
#chips::-webkit-scrollbar{display:none}
.chip{padding:7px 14px;background:#fff;border:1.5px solid var(--border);border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap;cursor:pointer;flex-shrink:0;transition:all .15s;color:var(--text2);box-shadow:0 1px 4px rgba(0,0,0,.04)}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 4px 12px rgba(99,102,241,.3)}
.chip:active{opacity:.7}

/* ── Main list ── */
#main{flex:1;overflow-y:auto;overflow-x:hidden;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
#main::-webkit-scrollbar{display:none}
.lcount{font-size:11px;color:var(--muted);padding:8px 16px 4px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}

/* ── Cards ── */
.card{background:#fff;border:1px solid var(--border);border-radius:16px;margin:0 16px 10px;display:flex;gap:12px;padding:12px;cursor:pointer;transition:transform .1s,box-shadow .1s;box-shadow:var(--shadow)}
.card:active{transform:scale(.97);box-shadow:none}
.c-cover{width:50px;height:70px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden}
.c-cover img{width:100%;height:100%;object-fit:cover;border-radius:8px}
.c-body{flex:1;min-width:0}
.c-title{font-size:14px;font-weight:700;line-height:1.3;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.c-sub{font-size:12px;color:var(--muted);margin-bottom:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.c-badges{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.c-meta{font-size:11px;color:var(--muted);margin-top:3px}
.bdg{padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:.3px}
.b-tbr{background:#f5f3ff;color:#6d28d9}
.b-reading{background:#eff6ff;color:#1d4ed8}
.b-finished{background:#f0fdf4;color:#15803d}
.b-dnf{background:#fef2f2;color:#b91c1c}
.b-paused{background:#fffbeb;color:#92400e}
.b-ff{background:#f5f3ff;color:#6d28d9;font-size:9px;text-transform:uppercase}
.b-book{background:#fffbeb;color:#92400e;font-size:9px;text-transform:uppercase}
.b-reread{background:#eff6ff;color:#1d4ed8}

/* ── Empty / loading ── */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-ico{font-size:56px;margin-bottom:14px}
.empty-txt{font-size:16px;font-weight:800;color:var(--text);margin-bottom:6px}
.empty-sub{font-size:14px}
.loading{text-align:center;padding:48px 20px;color:var(--muted);font-size:14px}

/* ── Grid ── */
#v-grid{display:none;flex:1;flex-direction:column;overflow-y:auto;overflow-x:hidden;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
#v-grid::-webkit-scrollbar{display:none}
.grid-crumb{padding:10px 16px 8px;font-size:12px;color:var(--muted);display:flex;gap:4px;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:2}
.crumb{color:var(--accent);cursor:pointer;font-weight:700}.crumb:active{opacity:.6}
.crumb-sep{color:var(--border2);margin:0 3px}
.folder-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:14px 16px 16px}
.folder-grid-root{grid-template-columns:1fr;margin-block:auto;width:100%}
.fc{background:#fff;border:1px solid var(--border);border-radius:18px;cursor:pointer;overflow:hidden;transition:transform .1s;box-shadow:var(--shadow);position:relative}
.fc:active{transform:scale(.97)}
.fc-thumb{aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;font-size:40px;overflow:hidden;position:relative}
.folder-grid-root .fc-thumb{aspect-ratio:16/9;font-size:64px}
.fc-thumb img{width:100%;height:100%;object-fit:cover}
.fc-body{padding:10px 12px 12px}
.fc-name{font-size:14px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text);margin-bottom:2px}
.folder-grid-root .fc-name{font-size:16px}
.fc-count{font-size:11px;color:var(--muted)}
.folder-grid-root .fc-count{font-size:13px}
.fc-edit-btn{position:absolute;top:6px;right:6px;width:28px;height:28px;background:rgba(255,255,255,.88);border-radius:50%;border:none;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);box-shadow:0 2px 8px rgba(0,0,0,.12);z-index:1}
.fc-edit-btn:active{opacity:.6}
.grid-section-lbl{padding:8px 16px 2px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}

/* ── Stats ── */
#v-stats{display:none;flex:1;overflow-y:auto;overflow-x:hidden;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
#v-stats::-webkit-scrollbar{display:none}
.stat-tabs{display:flex;gap:6px;padding:12px 16px 6px;overflow-x:auto;scrollbar-width:none}
.stat-tabs::-webkit-scrollbar{display:none}
.stab{padding:7px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;background:#fff;border:1.5px solid var(--border);color:var(--muted);white-space:nowrap;flex-shrink:0;box-shadow:var(--shadow)}
.stab.on{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 4px 12px rgba(99,102,241,.3)}
.stab:active{opacity:.7}
.ssum{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:8px 16px}
.stile{background:#fff;border:1px solid var(--border);border-radius:14px;padding:12px;text-align:center;box-shadow:var(--shadow)}
.stile-n{font-size:22px;font-weight:900;line-height:1.1;color:var(--text)}
.stile-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:4px;font-weight:700}
.sbreak{margin:0 16px 8px;background:#fff;border:1px solid var(--border);border-radius:14px;padding:12px;box-shadow:var(--shadow)}
.sbrow{display:flex;align-items:center;gap:6px;margin-bottom:7px;font-size:12px;color:var(--text2)}
.sbdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sbdot.green{background:#22c55e}.sbdot.purple{background:#8b5cf6}.sbdot.amber{background:#f59e0b}
.sblbl{flex:1;font-weight:600}.sbstat{color:var(--muted);font-size:11px}.sbpct{font-weight:800;min-width:32px;text-align:right;color:var(--text)}
.sbbar{height:6px;border-radius:3px;overflow:hidden;display:flex;margin-top:6px;background:var(--border)}
.sbseg{height:100%}.sbseg.green{background:#22c55e}.sbseg.purple{background:#8b5cf6}.sbseg.amber{background:#f59e0b}
.strend-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 6px;flex-wrap:wrap;gap:6px}
.strend-ttl{font-size:14px;font-weight:800;color:var(--text)}
.sctrl-row{display:flex;gap:6px;flex-wrap:wrap}
.spbtn,.smbtn{padding:5px 11px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;background:#fff;border:1.5px solid var(--border);color:var(--muted);box-shadow:0 1px 4px rgba(0,0,0,.04)}
.spbtn.on,.smbtn.on{background:var(--accent);border-color:var(--accent);color:#fff}
.spbtn:active,.smbtn:active{opacity:.7}
.schart{display:flex;align-items:flex-end;gap:3px;padding:0 16px;overflow-x:auto;scrollbar-width:none}
.schart::-webkit-scrollbar{display:none}
.scol{display:flex;flex-direction:column;align-items:center;flex-shrink:0;min-width:20px}
.sbar-v{font-size:8px;font-weight:800;color:var(--accent2);margin-bottom:3px;white-space:nowrap;min-height:12px;text-align:center}
.sbar-wrap{height:90px;display:flex;align-items:flex-end;width:100%}
.sbar{background:var(--accent);border-radius:4px 4px 0 0;width:100%;transition:height .3s}
.sbar.empty{background:var(--border)}
.sbar-lbl{font-size:9px;color:var(--muted);margin-top:4px;text-align:center;font-weight:600}
.schart-base{height:1px;background:var(--border);margin:0 16px 4px}
.snote{font-size:11px;color:var(--muted);padding:6px 16px 20px;line-height:1.6}

/* ── Bottom nav ── */
#bottom-nav{position:fixed;left:0;right:0;bottom:0;height:calc(var(--nav-h) + var(--nav-inset));background:#fff;border-top:1px solid var(--border);display:flex;align-items:stretch;z-index:190;box-shadow:0 -4px 20px rgba(99,102,241,.08)}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding-bottom:var(--nav-inset);cursor:pointer;transition:opacity .1s;gap:3px;-webkit-tap-highlight-color:transparent}
.bnav-item:active{opacity:.6}
.bnav-ico{font-size:22px;line-height:1;transition:transform .15s}
.bnav-lbl{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.2px;transition:color .15s}
.bnav-item.on .bnav-lbl{color:var(--accent)}
.bnav-item.on .bnav-ico{transform:scale(1.12)}

/* ── FAB ── */
#fab{position:fixed;bottom:calc(var(--nav-h) + var(--nav-inset) + 18px);right:20px;width:56px;height:56px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:17px;font-size:28px;color:#fff;cursor:pointer;box-shadow:0 8px 24px rgba(99,102,241,.42);display:flex;align-items:center;justify-content:center;z-index:100;transition:transform .15s}
#fab:active{transform:scale(.9)}
#fab.hidden{display:none}

/* ── Sheet ── */
#shade{position:fixed;inset:0;background:rgba(30,27,74,.45);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s;cursor:pointer}
#shade.on{opacity:1;pointer-events:all}
#sheet{position:fixed;left:0;right:0;bottom:0;background:#fff;border-radius:24px 24px 0 0;z-index:201;max-height:92vh;overflow-y:auto;overflow-x:hidden;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;transform:translateY(100%);transition:transform .32s cubic-bezier(.32,.72,0,1);padding-bottom:calc(var(--safe-bottom) + 20px);touch-action:pan-y}
#sheet::-webkit-scrollbar{display:none}
#sheet.on{transform:translateY(0)}

/* Sheet sticky topbar — ALWAYS VISIBLE */
.sh-topbar{position:sticky;top:0;z-index:10;background:#fff;padding:10px 12px;display:flex;align-items:center;border-bottom:1px solid var(--border);flex-shrink:0}
.sh-topbar-spacer{flex:1}
.sh-drag-bar{width:40px;height:4px;background:var(--border);border-radius:2px;flex-shrink:0}
.sh-topbar-end{flex:1;display:flex;justify-content:flex-end}
.sh-close-btn{width:32px;height:32px;background:var(--surface);border:none;border-radius:50%;font-size:17px;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700}
.sh-close-btn:active{background:var(--border);opacity:.7}

.sh-top{display:flex;gap:14px;padding:16px 20px;align-items:flex-start}
.sh-cover-wrap{position:relative;flex-shrink:0}
.sh-cover{width:84px;height:118px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:36px;overflow:hidden}
.sh-cover img{width:100%;height:100%;object-fit:cover;border-radius:12px}
.sh-cover-edit{position:absolute;bottom:4px;right:4px;width:28px;height:28px;background:rgba(255,255,255,.92);border-radius:50%;border:none;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.18)}
.sh-cover-edit:active{opacity:.6}
.sh-info{flex:1;min-width:0;padding-top:4px}
.sh-title{font-size:19px;font-weight:800;line-height:1.3;margin-bottom:4px;color:var(--text)}
.sh-sub{font-size:13px;color:var(--muted);margin-bottom:8px}
.sh-sec{padding:14px 20px;border-top:1px solid var(--border)}
.sh-lbl{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.st-row{display:flex;gap:6px;flex-wrap:wrap}
.st-chip{padding:8px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:#fff;transition:all .15s;color:var(--text2)}
.st-chip:active{opacity:.7}
.st-chip.a-TBR{background:#f5f3ff;border-color:#8b5cf6;color:#6d28d9}
.st-chip.a-Reading{background:#eff6ff;border-color:#60a5fa;color:#1d4ed8}
.st-chip.a-Finished{background:#f0fdf4;border-color:#4ade80;color:#15803d}
.st-chip.a-DNF{background:#fef2f2;border-color:#f87171;color:#b91c1c}
.st-chip.a-Paused{background:#fffbeb;border-color:#fbbf24;color:#92400e}
.stars-row{display:flex;gap:8px;font-size:28px}
.s-star{opacity:.18;cursor:pointer;transition:opacity .1s,transform .1s;color:var(--accent)}
.s-star.on{opacity:1}.s-star:active{transform:scale(1.3)}
.rr-row{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px}
.rr-label{font-size:14px;color:var(--accent2);font-weight:700}
.rr-btn{background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:700;padding:8px 16px;cursor:pointer}
.rr-btn:active{opacity:.8}
.rr-info{display:flex;flex-direction:column;gap:2px}
.rr-sub{font-size:11px;color:var(--accent);opacity:.8}
.rr-stepper{display:flex;gap:8px;align-items:center}
.rr-step{width:36px;height:36px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-size:20px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;-webkit-tap-highlight-color:transparent}
.rr-step:active{opacity:.8}
.rr-step:disabled{background:#c7d2fe}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.info-tile{background:var(--surface);border-radius:10px;padding:10px 12px}
.info-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;font-weight:700}
.info-val{font-size:14px;font-weight:700;margin-top:2px;color:var(--text)}
.sh-tags{display:flex;flex-wrap:wrap;gap:6px}
.sh-tag{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-size:12px;color:var(--accent2);font-weight:600}
.sh-notes{font-size:13px;color:var(--text2);background:var(--surface);border-radius:12px;padding:12px 14px;font-style:italic;line-height:1.7}
.sh-actions{display:flex;gap:8px;padding:14px 20px;border-top:1px solid var(--border)}
.btn{flex:1;padding:13px;border:1.5px solid var(--border);border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;background:#fff;color:var(--text);display:flex;align-items:center;justify-content:center;gap:6px;box-shadow:0 1px 6px rgba(0,0,0,.04)}
.btn-p{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 4px 14px rgba(99,102,241,.3)}
.btn-d{border-color:#fca5a5;color:#b91c1c;background:#fff5f5}
.btn:active{opacity:.75}

/* ── Icon edit sheet ── */
#icon-shade{position:fixed;inset:0;background:rgba(30,27,74,.4);z-index:400;opacity:0;pointer-events:none;transition:opacity .2s}
#icon-shade.on{opacity:1;pointer-events:all}
#icon-sheet{position:fixed;left:0;right:0;bottom:0;background:#fff;border-radius:22px 22px 0 0;z-index:401;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);padding:16px 20px;padding-bottom:calc(var(--safe-bottom) + 20px)}
#icon-sheet.on{transform:translateY(0)}
.ish-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.ish-title{font-size:15px;font-weight:800;color:var(--text)}
.ish-close{width:30px;height:30px;background:var(--surface);border:none;border-radius:50%;font-size:16px;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center}
.ish-preview{width:80px;height:80px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:38px;margin:0 auto 14px;overflow:hidden}

.ish-row{display:flex;gap:8px;margin-bottom:12px}

.ish-save{padding:11px 16px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;cursor:pointer}

.m-nav{display:flex;align-items:center;justify-content:space-between;padding:calc(var(--safe-top) + 12px) 16px 12px;background:rgba(248,247,255,.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);flex-shrink:0;position:sticky;top:0;z-index:5}

.m-lbl:first-child{margin-top:0}
.m-in{width:100%;padding:13px 14px;background:#fff;border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-size:15px;outline:none;-webkit-appearance:none;font-family:inherit;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.m-in:focus{border-color:var(--accent)}
.m-sel{width:100%;padding:13px 14px;background:#fff;border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-size:15px;outline:none;-webkit-appearance:none;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.m-sel option{background:#fff;color:var(--text)}
.m-ta{width:100%;padding:13px 14px;background:#fff;border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-size:15px;outline:none;resize:none;min-height:80px;font-family:inherit;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.m-ta:focus{border-color:var(--accent)}
.type-row{display:flex;gap:8px}
.type-btn{flex:1;padding:12px;background:#fff;border:1.5px solid var(--border);border-radius:12px;color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;text-align:center}
.type-btn.on{background:var(--surface);border-color:var(--accent);color:var(--accent2)}
.f-row{display:flex;gap:10px}
.f-row>div{flex:1;min-width:0}
.fetch-row{display:flex;gap:8px}
.fetch-row .m-in{flex:1}
.fetch-btn{padding:13px 14px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;color:var(--accent2);font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
.fetch-btn:active{opacity:.7}

.fetch-msg.ok{display:block;background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0}
.fetch-msg.err{display:block;background:#fef2f2;color:#b91c1c;border:1px solid #fca5a5}

.tag-add-row .m-in{flex:1}
.tag-add-btn{padding:13px 16px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;color:var(--accent2);font-size:20px;font-weight:700;cursor:pointer}
.tags-area{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px;min-height:10px}
.m-tag{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-size:12px;color:var(--accent2);display:flex;align-items:center;gap:5px;font-weight:600}

.m-tag-x:active{color:#b91c1c}
.m-stars{display:flex;gap:8px;font-size:30px;margin-top:6px}
.m-star{opacity:.15;cursor:pointer;transition:opacity .15s;color:var(--accent)}.m-star.on{opacity:1}

/* ── Toast ── */
#toast-wrap{position:fixed;top:calc(var(--safe-top) + 68px);left:50%;transform:translateX(-50%);z-index:700;pointer-events:none}
.toast-el{padding:11px 22px;border-radius:28px;font-size:13px;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,.18);white-space:nowrap;display:flex;align-items:center;gap:8px;animation:tin .2s ease}
@keyframes tin{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
</style>

<body>

<div id="toast-wrap"></div>

<script>
// ── Auto-update: register a network-first service worker so new code loads on launch ──
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').then(reg=>{
    reg.addEventListener('updatefound',()=>{
      const w=reg.installing;
      w&&w.addEventListener('statechange',()=>{
        // a newer version activated while the app was open — reload to apply it
        if(w.state==='activated'&&navigator.serviceWorker.controller) location.reload();
      });
    });
  }).catch(()=>{});
}
// ── Config ────────────────────────────────────────────────────────────────────
const REPO='elenaliberti/my-library';
const FILE='library-data.json';
const API='https://api.github.com';
const STATUS=['TBR','Reading','Finished','Paused','DNF'];

const FOLDER_DEFAULTS={
  'ff|Harry Potter - J. K. Rowling':{displayName:'Harry Potter',icon:'⚡'},
  'ff|Harry Potter - J. K. Rowling|Drarry':{displayName:'Draco/Harry',icon:'🐍'},
  'ff|Harry Potter - J. K. Rowling|Tomarry':{displayName:'Tom Riddle/Harry',icon:'🐍'},
  'ff|Harry Potter - J. K. Rowling|Harry/Hermione':{displayName:'Harry & Hermione',icon:'📚'},
  'ff|Harry Potter - J. K. Rowling|Harry/Ginny':{displayName:'Harry & Ginny',icon:'🔥'},
  'ff|Harry Potter - J. K. Rowling|Mentor Severus':{displayName:'Mentor Severus',icon:'🧪'},
  'ff|Harry Potter - J. K. Rowling|Powerful!Harry':{displayName:'Powerful Harry',icon:'💥'},
  'ff|Harry Potter - J. K. Rowling|Time/Dimension Travel HP':{displayName:'Time Travel',icon:'⏳'},
  'ff|Harry Potter - J. K. Rowling|Harry in Slytherin':{displayName:'Harry in Slytherin',icon:'🐍'},
  'ff|Harry Potter - J. K. Rowling|Creature Harry':{displayName:'Creature Harry',icon:'🐺'},
};

// ── State ─────────────────────────────────────────────────────────────────────
const S={
  items:[],sha:null,loading:false,
  folderConfig:{},
  search:'',filter:'all',sortBy:'added',statFilter:'all',
  view:'library',
  folderPath:[],
  statsPeriod:'year',statsMetric:'words',statsCat:'all',
  selId:null,editing:null,mRating:0,mTags:[],
};

// ── Utils ─────────────────────────────────────────────────────────────────────
const genId=()=>`${Date.now()}_${Math.random().toString(36).slice(2,8)}`;
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmt=n=>!n?'':(n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(0)+'K':String(n));
const fmtN=n=>!n?'—':(n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?Math.round(n/1e3)+'K':n.toLocaleString());
const itemWords=x=>x.words||(x.pages?x.pages*250:0);
// Times read: prefer the per-read timestamp list, fall back to the legacy count.
const timesRead=x=>Array.isArray(x.readDates)?x.readDates.length:(x.readCount??(x.status==='Finished'?1:0));
// Re-read multiplier: counts every item at least once, +1× for each re-read beyond the first.
const readMult=x=>Math.max(1,timesRead(x));
// Per-read timestamps, migrating legacy reads to the finish date (best-known date for old reads).
const ensureReadDates=x=>Array.isArray(x.readDates)?x.readDates.slice():Array.from({length:x.readCount??(x.status==='Finished'?1:0)},()=>x.finishedAt||null);
// Most recent read timestamp, or null.
const lastReadAt=x=>{const d=ensureReadDates(x).filter(Boolean);return d.length?d[d.length-1]:null};
// Flatten items into individual read events, each dated when that read happened.
const readEvents=items=>{const ev=[];items.forEach(x=>{const w=itemWords(x);ensureReadDates(x).forEach(d=>{if(d)ev.push({date:d,words:w})})});return ev};
// ── Merge (so phone ↔ desktop saves never clobber each other) ──
function pickItem(a,b){
  const ma=Date.parse(a._modAt||'')||0, mb=Date.parse(b._modAt||'')||0;
  if(ma!==mb)return ma>mb?a:b;                       // most recently edited wins
  const score=x=>{let t=0;if(Array.isArray(x.readDates)&&x.readDates.length){const d=Date.parse(x.readDates[x.readDates.length-1]);if(d)t=Math.max(t,d)}if(x.finishedAt){const d=Date.parse(x.finishedAt);if(d)t=Math.max(t,d)}return t};
  const sa=score(a),sb=score(b);if(sa!==sb)return sa>sb?a:b;
  const ra=Array.isArray(a.readDates)?a.readDates.length:(a.readCount||0),rb=Array.isArray(b.readDates)?b.readDates.length:(b.readCount||0);
  return rb>ra?b:a;
}
function mergeLibrary(localItems,localFC,remoteItems,remoteFC){
  const byId=new Map();
  (remoteItems||[]).forEach(x=>{if(x&&x.id!=null)byId.set(x.id,x)});
  (localItems||[]).forEach(x=>{if(!x||x.id==null)return;const r=byId.get(x.id);byId.set(x.id,r?pickItem(x,r):x)});
  const fc={...(remoteFC||{})};
  for(const [k,v] of Object.entries(localFC||{})){const m={...(fc[k]||{})};for(const [kk,vv] of Object.entries(v||{}))if(vv!=null&&vv!=='')m[kk]=vv;fc[k]=m}
  return{items:[...byId.values()],folderConfig:fc};
}
function fmtTime(m){if(!m)return'0m';const h=Math.floor(m/60);if(!h)return Math.round(m)+'m';const d=Math.floor(h/24);const rh=h%24;if(!d)return h+'h';return rh?`${d}d ${rh}h`:`${d}d`}
function djb2(s){let h=5381;for(let i=0;i<s.length;i++)h=((h<<5)+h)^s.charCodeAt(i);return h>>>0}
const GR=[['#7c3aed','#2563eb'],['#db2777','#9333ea'],['#059669','#0284c7'],['#dc2626','#ea580c'],['#0891b2','#0d9488'],['#7c3aed','#ec4899'],['#1d4ed8','#4f46e5'],['#d97706','#dc2626'],['#0f766e','#0891b2'],['#9333ea','#0ea5e9']];
const grad=k=>GR[djb2(k||'x')%GR.length];
function badgeClass(s){return{TBR:'b-tbr',Reading:'b-reading',Finished:'b-finished',DNF:'b-dnf',Paused:'b-paused'}[s]||'b-tbr'}

// ── folderConfig helpers ──────────────────────────────────────────────────────
function getCfg(key){return{...(FOLDER_DEFAULTS[key]||{}), ...(S.folderConfig[key]||{})}}
function setCfg(key,patch){
  S.folderConfig[key]={...(S.folderConfig[key]||{}),...patch};
  const c=S.folderConfig[key];
  if(!c.displayName&&!c.icon&&!c.pinned&&!c.isCustom&&!c.filterTag) delete S.folderConfig[key];
}

// ── GitHub API ─────────────────────────────────────────────────────────────────
const tok=()=>localStorage.getItem('gh_token');
const ghH=()=>({'Authorization':`Bearer ${tok()}`,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'});

async function ghLoad(){
  const r=await fetch(`${API}/repos/${REPO}/contents/${FILE}`,{headers:ghH()});
  if(r.status===401)throw new Error('invalid_token');
  if(!r.ok)throw new Error(`GitHub ${r.status}`);
  const d=await r.json();
  const parsed=JSON.parse(atob(d.content.replace(/\n/g,'')));
  const items=Array.isArray(parsed)?parsed:(parsed.items||[]);
  const folderConfig=Array.isArray(parsed)?{}:(parsed.folderConfig||{});
  return{items,folderConfig,sha:d.sha};
}

async function ghSave(items,folderConfig,sha){
  const data={items,folderConfig};
  const content=btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))));
  const now=new Date().toLocaleString('en-GB',{dateStyle:'medium',timeStyle:'short'});
  const r=await fetch(`${API}/repos/${REPO}/contents/${FILE}`,{
    method:'PUT',headers:ghH(),
    body:JSON.stringify({message:`Mobile update — ${now}`,content,sha})
  });
  if(r.status===409)throw new Error('conflict');
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.message||`GitHub ${r.status}`)}
  return(await r.json()).content.sha;
}

// ── Auto-fill: Books ──────────────────────────────────────────────────────────
async function fetchBook(query){
  const r=await fetch(`https://openlibrary.org/search.json?q=${encodeURIComponent(query)}&limit=3&fields=title,author_name,number_of_pages_median,subject`);
  if(!r.ok)throw new Error('Not found');
  const d=await r.json();
  const doc=(d.docs||[])[0];if(!doc)throw new Error('Not found');
  const subjects=(doc.subject||[]).filter(s=>s.length<35);
  return{title:doc.title||null,author:(doc.author_name||[]).slice(0,2).join(', ')||null,pages:doc.number_of_pages_median||null,genre:subjects[0]||null};
}

// ── Auto-fill: AO3 / FF.net ───────────────────────────────────────────────────
async function fetchFic(url){
  const isAO3=url.includes('archiveofourown');
  const isFF=url.includes('fanfiction.net');
  if(!isAO3&&!isFF)throw new Error('URL must be from AO3 or fanfiction.net');
  const target=isAO3?(url.replace(/\/chapters\/[^?#]+/,'').replace(/#.*$/,'')+(url.includes('?')?'&':'?')+'view_adult=true'):url;
  const proxyUrl='https://corsproxy.io/?'+encodeURIComponent(target);
  const r=await fetch(proxyUrl,{headers:{'User-Agent':'Mozilla/5.0'}});
  if(!r.ok)throw new Error(`Proxy error ${r.status}`);
  const html=await r.text();
  const strip=s=>(s||'').replace(/<[^>]+>/g,'').replace(/\s+/g,' ').trim();
  const getSec=cls=>{const m=html.match(new RegExp(`<dd[^>]*class="[^"]*${cls}[^"]*"[^>]*>([\\s\\S]*?)<\\/dd>`,'i'));return m?m[1]:null};
  const firstTag=s=>{const m=(s||'').match(/<a[^>]*class="[^"]*tag[^"]*"[^>]*>([^<]+)<\/a>/i);return m?m[1].trim():null};
  const allTags=s=>{const tags=[];const rx=/<a[^>]*class="[^"]*tag[^"]*"[^>]*>([^<]+)<\/a>/gi;let m;while((m=rx.exec(s||''))!==null)tags.push(m[1].trim());return tags};
  if(isAO3){
    const titleBlock=html.match(/<h2[^>]*class="[^"]*title[^"]*"[^>]*>([\s\S]*?)<\/h2>/i);
    const title=titleBlock?strip(titleBlock[1]):html.match(/<title>([^|<]+)/i)?.[1]?.replace(/ - Archive of Our Own$/,'').trim()||null;
    const author=html.match(/<a[^>]*rel="author"[^>]*>([^<]+)<\/a>/i)?.[1]?.trim()||null;
    const fandoms=allTags(getSec('fandom'));
    const words=parseInt((strip(getSec('words')||'').replace(/,/g,'')))||null;
    const kudos=parseInt((strip(getSec('kudos')||'').replace(/,/g,'')))||null;
    const rating=firstTag(getSec('rating'));
    const pairing=firstTag(getSec('relationship'));
    const tags=allTags(getSec('freeform')).slice(0,6);
    return{title,author,fandom:fandoms[0]||null,words,hearts:kudos,rating,pairing,tags};
  } else {
    const pageTitleRaw=html.match(/<title>([^<]+)<\/title>/i)?.[1]||'';
    const pt=pageTitleRaw.replace(/\s*\|\s*FanFiction\s*$/i,'').trim();
    const fm=pt.match(/^(.+?),\s+a\s+(.+?)\s+(?:Crossover\s+)?fanfic$/i);
    const title=fm?fm[1].trim():pt.replace(/,.*$/,'').trim()||null;
    const fandom=fm?fm[2].trim():null;
    const author=html.match(/<a[^>]+href=['"]\/u\/\d+\/[^'"]+['"][^>]*>([^<]+)<\/a>/i)?.[1]?.trim()||null;
    const words=parseInt((html.match(/Words:\s*([\d,]+)/i)?.[1]||'').replace(/,/g,''))||null;
    const hearts=parseInt((html.match(/Favs:\s*([\d,]+)/i)?.[1]||'').replace(/,/g,''))||null;
    return{title,author,fandom,words,hearts,rating:null,pairing:null,tags:[]};
  }
}

// ── Filtering / sorting ───────────────────────────────────────────────────────
function filtered(){
  let items=[...S.items];
  if(S.statFilter!=='all')items=items.filter(x=>x.status===S.statFilter);
  if(S.filter==='ff'||S.filter==='book')items=items.filter(x=>x.type===S.filter);
  else if(S.filter==='oneshot')items=items.filter(x=>x.type==='ff'&&x.oneshot);
  else if(S.filter==='fav')items=items.filter(x=>x.favorite);
  else if(S.filter!=='all')items=items.filter(x=>x.status===S.filter);
  if(S.search){
    const q=S.search.toLowerCase();
    items=items.filter(x=>(x.title||'').toLowerCase().includes(q)||(x.author||'').toLowerCase().includes(q)||(x.fandom||'').toLowerCase().includes(q)||(x.genre||'').toLowerCase().includes(q)||(x.tags||[]).some(t=>t.toLowerCase().includes(q)));
  }
  items.sort((a,b)=>{
    if(S.sortBy==='title')return(a.title||'').localeCompare(b.title||'');
    if(S.sortBy==='author')return(a.author||'').localeCompare(b.author||'');
    if(S.sortBy==='words')return(b.words||0)-(a.words||0);
    if(S.sortBy==='rating')return(b.userRating||0)-(a.userRating||0);
    // default 'recent': most recently read/finished first; not-yet-read items on top by add order
    const ra=lastReadAt(a),rb=lastReadAt(b);
    const ta=ra?Date.parse(ra):null,tb=rb?Date.parse(rb):null;
    if(ta===null&&tb===null)return(b._addedAt??0)-(a._addedAt??0);
    if(ta===null)return -1;
    if(tb===null)return 1;
    if(tb!==ta)return tb-ta;
    return(b._addedAt??0)-(a._addedAt??0);
  });
  return items;
}

// ── Cover helper ──────────────────────────────────────────────────────────────
function cover(item,w,h,r){
  const[c1,c2]=grad(item.id||'');
  const ic=item.coverIcon||'';
  const inner=ic.startsWith('http')
    ?`<img src="${esc(ic)}" style="width:100%;height:100%;object-fit:cover;border-radius:${r}px" onerror="this.style.display='none'">`
    :`<span style="font-size:${w<60?22:36}px">${ic||(item.type==='ff'?'✍️':'📚')}</span>`;
  return `<div style="width:${w}px;height:${h}px;border-radius:${r}px;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;background:linear-gradient(135deg,${c1},${c2})">${inner}</div>`;
}

// ── Status pill row ───────────────────────────────────────────────────────────
function renderStatRow(){
  const el=document.getElementById('stat-row');if(!el)return;

// ── Library list ──────────────────────────────────────────────────────────────
function renderLibrary(){
  const el=document.getElementById('main');if(!el)return;
  if(S.loading){el.innerHTML='<div class="loading">Loading your library…</div>';return}
  const items=filtered();
  if(!items.length){
    el.innerHTML=`<div class="empty"><div class="empty-ico">${S.search?'🔍':'📖'}</div><div class="empty-txt">${S.search?'No results':'Nothing here yet'}</div><div class="empty-sub">${S.search?'Try a different search':'Tap ＋ to add your first entry'}</div></div>`;
    return;
  }
  const rows=[`<div class="lcount">${items.length} item${items.length!==1?'s':''}</div>`];
  for(const x of items){
    const sub=x.type==='ff'?`${x.author||'—'}${x.fandom?' · '+x.fandom:''}`:`${x.author||'—'}${x.genre?' · '+x.genre:''}`;
    const rc=timesRead(x);
    const meta=[];
    if(x.words)meta.push(`${fmt(x.words)}w`);
    if(x.type!=='ff'&&x.pages)meta.push(`${x.pages}p`);
    if(rc>1)meta.push(`↻${rc}`);
    if(x.favorite)meta.push('⭐');
    rows.push(`<div class="card" data-id="${esc(x.id)}">${cover(x,50,70,8)}<div class="c-body"><div class="c-title">${esc(x.title||'Untitled')}</div><div class="c-sub">${esc(sub)}</div><div class="c-badges"><span class="bdg ${badgeClass(x.status)}">${esc(x.status||'TBR')}</span>${x.type==='ff'?'<span class="bdg b-ff">FF</span>':'<span class="bdg b-book">BOOK</span>'}${x.oneshot?'<span class="bdg b-ff">1-shot</span>':''}${rc>1?`<span class="bdg b-reread">↻${rc}</span>`:''}</div>${meta.length?`<div class="c-meta">${meta.join(' · ')}</div>`:''}</div></div>`);
  }
  el.innerHTML=rows.join('');
  el.querySelectorAll('.card').forEach(c=>c.addEventListener('click',()=>openSheet(c.dataset.id)));
}

// ── Grid / folder view ────────────────────────────────────────────────────────
function renderGrid(){
  const el=document.getElementById('v-grid');if(!el)return;
  const path=S.folderPath;

  function folderCard(label,icon,count,key){
    const cfg=key?getCfg(key):{};
    const displayLabel=cfg.displayName||label;
    const displayIcon=cfg.icon||icon||'📁';
    const[c1,c2]=grad(key||label);
    const iconHtml=displayIcon.startsWith('http')
      ?`<img src="${esc(displayIcon)}" style="width:100%;height:100%;object-fit:cover">`
      :`<span>${displayIcon}</span>`;
    const editBtn=`<button class="fc-edit-btn" data-edit-key="${esc(key||'')}">✏️</button>`;
    return `<div class="fc" data-fc-label="${esc(label)}">
      <div class="fc-thumb" style="background:linear-gradient(135deg,${c1},${c2})">${iconHtml}${key?editBtn:''}</div>
      <div class="fc-body"><div class="fc-name">${esc(displayLabel)}</div><div class="fc-count">${count} item${count!==1?'s':''}</div></div>
    </div>`;
  }

  function crumbBar(crumbs){
    let html=`<div class="grid-crumb"><span class="crumb" data-go="[]">Home</span>`;
    crumbs.forEach((c,i)=>{
      html+=`<span class="crumb-sep">›</span><span class="crumb" data-go="${esc(JSON.stringify(c.path))}">${esc(c.label)}</span>`;
    });
    return html+'</div>';
  }

  function fandomEmoji(f){
    const k=(f||'').toLowerCase();
    if(k.includes('harry potter'))return'⚡';if(k.includes('percy jackson')||k.includes('pjo'))return'🔱';
    if(k.includes('marvel')||k.includes('avengers'))return'🦸';if(k.includes('star wars'))return'⭐';
    if(k.includes('lord of the rings')||k.includes('tolkien'))return'💍';if(k.includes('twilight'))return'🌙';
    if(k.includes('teen wolf'))return'🐺';if(k.includes('supernatural'))return'🌑';
    if(k.includes('merlin'))return'🔮';if(k.includes('game of thrones')||k.includes('asoiaf'))return'🐉';
    if(k.includes('naruto'))return'🍥';if(k.includes('attack on titan'))return'⚔️';
    if(k.includes('hunger games'))return'🏹';if(k.includes('doctor who'))return'🌀';
    return'📁';
  }
  function genreEmoji(g){
    const k=(g||'').toLowerCase();
    if(k.includes('romantasy')||k.includes('fantasy'))return'🐉';if(k.includes('romance'))return'💕';
    if(k.includes('thriller')||k.includes('suspense'))return'🔪';if(k.includes('mystery'))return'🔍';
    if(k.includes('sci')||k.includes('science fiction'))return'🚀';if(k.includes('horror'))return'👻';
    if(k.includes('historical'))return'🏛️';if(k.includes('ya')||k.includes('young adult'))return'✨';
    return'📚';
  }

  function itemListHtml(items){
    if(!items.length)return`<div class="empty"><div class="empty-ico">📭</div><div class="empty-txt">Nothing here</div></div>`;
    return`<div class="lcount" style="padding-top:12px">${items.length} item${items.length!==1?'s':''}</div>`+
      items.map(x=>{
        const rc=timesRead(x);
        const meta=[];if(x.words)meta.push(`${fmt(x.words)}w`);if(x.pages&&x.type!=='ff')meta.push(`${x.pages}p`);if(rc>1)meta.push(`↻${rc}`);if(x.favorite)meta.push('⭐');
        return`<div class="card" data-id="${esc(x.id)}">${cover(x,50,70,8)}<div class="c-body"><div class="c-title">${esc(x.title||'Untitled')}</div><div class="c-sub">${esc(x.author||'—')}</div><div class="c-badges"><span class="bdg ${badgeClass(x.status)}">${esc(x.status||'TBR')}</span></div>${meta.length?`<div class="c-meta">${meta.join(' · ')}</div>`:''}</div></div>`;
      }).join('');
  }

  let html='';

  // ── Level 0: root ──
  if(!path.length){
    const ffN=S.items.filter(x=>x.type==='ff').length;
    const bkN=S.items.filter(x=>x.type==='book').length;
    html=`<div class="folder-grid folder-grid-root" style="padding-top:14px">
      ${folderCard('Fanfiction','📖',ffN,'ff')}
      ${folderCard('Books','📚',bkN,'book')}
    </div>`;

  // ── Level 1: FF → fandoms ──
  }else if(path[0]==='Fanfiction'&&path.length===1){
    const fandoms=[...new Set(S.items.filter(x=>x.type==='ff'&&x.fandom).map(x=>x.fandom))].sort();
    const none=S.items.filter(x=>x.type==='ff'&&!x.fandom).length;
    let cards=fandoms.map(f=>{
      const n=S.items.filter(x=>x.type==='ff'&&x.fandom===f).length;
      const key=`ff|${f}`;
      return folderCard(f,fandomEmoji(f),n,key);
    });
    if(none)cards.push(folderCard('Other','📄',none,'ff|__none__'));
    html=crumbBar([{label:'Fanfiction',path:['Fanfiction']}])+`<div class="folder-grid">${cards.join('')}</div>`;

  // ── Level 2: fandom → tag/pairing folders ──
  }else if(path[0]==='Fanfiction'&&path.length===2){
    const fandom=path[1];
    const ficItems=fandom==='Other'?S.items.filter(x=>x.type==='ff'&&!x.fandom):S.items.filter(x=>x.type==='ff'&&x.fandom===fandom);
    const fandomKey=`ff|${fandom==='Other'?'__none__':fandom}`;
    const fandomLabel=getCfg(fandomKey).displayName||fandom;

    // Build section: All + Pairings + Tags
    const pairings=[...new Set(ficItems.filter(x=>x.pairing).map(x=>x.pairing))].sort();
    const allTagsSet=new Set();ficItems.forEach(x=>(x.tags||[]).forEach(t=>allTagsSet.add(t)));
    const tags=[...allTagsSet].sort();

    let cards=[];
    // "All" folder always first
    const allKey=`ff|${fandom==='Other'?'__none__':fandom}|__all__`;
    cards.push(`<div class="fc" data-fc-label="__all__"><div class="fc-thumb" style="background:linear-gradient(135deg,${grad(allKey)[0]},${grad(allKey)[1]})"><span>📖</span></div><div class="fc-body"><div class="fc-name">All (${ficItems.length})</div><div class="fc-count">${ficItems.length} item${ficItems.length!==1?'s':''}</div></div></div>`);

    let sections='';
    if(pairings.length){
      sections+=`<div class="grid-section-lbl">💞 Pairings</div><div class="folder-grid">`;
      sections+=pairings.map(p=>{
        const n=ficItems.filter(x=>x.pairing===p).length;
        const key=`ff|${fandom==='Other'?'__none__':fandom}|${p}`;
        return folderCard(p,getCfg(key).icon||'💞',n,key);
      }).join('');
      sections+='</div>';
    }
    if(tags.length){
      sections+=`<div class="grid-section-lbl">🏷 Tags</div><div class="folder-grid">`;
      sections+=tags.map(t=>{
        const n=ficItems.filter(x=>(x.tags||[]).includes(t)).length;
        const key=`ff|${fandom==='Other'?'__none__':fandom}|${t}`;
        return folderCard(t,getCfg(key).icon||'🏷',n,key);
      }).join('');
      sections+='</div>';
    }
    html=crumbBar([{label:'Fanfiction',path:['Fanfiction']},{label:fandomLabel,path:['Fanfiction',fandom]}])+
      `<div class="folder-grid">${cards.join('')}</div>${sections}`;

  // ── Level 3: fandom → tag/pairing → items ──
  }else if(path[0]==='Fanfiction'&&path.length===3){
    const fandom=path[1];const tagFilter=path[2];
    const ficItems=fandom==='Other'?S.items.filter(x=>x.type==='ff'&&!x.fandom):S.items.filter(x=>x.type==='ff'&&x.fandom===fandom);
    const items=tagFilter==='__all__'?ficItems:ficItems.filter(x=>x.pairing===tagFilter||(x.tags||[]).includes(tagFilter));
    const fandomKey=`ff|${fandom==='Other'?'__none__':fandom}`;
    const fandomLabel=getCfg(fandomKey).displayName||fandom;
    const tagLabel=tagFilter==='__all__'?'All':tagFilter;
    html=crumbBar([{label:'Fanfiction',path:['Fanfiction']},{label:fandomLabel,path:['Fanfiction',fandom]},{label:tagLabel,path:['Fanfiction',fandom,tagFilter]}])+
      itemListHtml(items);

  // ── Books → genres ──
  }else if(path[0]==='Books'&&path.length===1){
    const genres=[...new Set(S.items.filter(x=>x.type==='book'&&x.genre).map(x=>(x.genre||'').split(' / ')[0].trim()))].sort();
    const none=S.items.filter(x=>x.type==='book'&&!x.genre).length;
    let cards=genres.map(g=>{
      const n=S.items.filter(x=>x.type==='book'&&(x.genre||'').split(' / ')[0].trim()===g).length;
      return folderCard(g,genreEmoji(g),n,`book|${g}`);
    });
    if(none)cards.push(folderCard('Other','📖',none,'book|__none__'));
    html=crumbBar([{label:'Books',path:['Books']}])+`<div class="folder-grid">${cards.join('')}</div>`;

  // ── Books → genre → items ──
  }else if(path[0]==='Books'&&path.length===2){
    const genre=path[1];
    const items=genre==='Other'?S.items.filter(x=>x.type==='book'&&!x.genre):S.items.filter(x=>x.type==='book'&&(x.genre||'').split(' / ')[0].trim()===genre);
    const genreLabel=getCfg(`book|${genre}`).displayName||genre;
    html=crumbBar([{label:'Books',path:['Books']},{label:genreLabel,path:['Books',genre]}])+itemListHtml(items);
  }

  el.innerHTML=html;

  // folder card clicks
  el.querySelectorAll('.fc').forEach(fc=>{
    fc.addEventListener('click',e=>{
      if(e.target.closest('.fc-edit-btn'))return; // handled separately
      const lbl=fc.dataset.fcLabel;
      if(!path.length){S.folderPath=[lbl==='Fanfiction'?'Fanfiction':'Books'];renderGrid();}
      else if(path.length===1){S.folderPath=[...path,lbl];renderGrid();}
      else if(path.length===2){S.folderPath=[...path,lbl];renderGrid();}
    });
  });

  // folder edit buttons
  el.querySelectorAll('.fc-edit-btn').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const key=btn.dataset.editKey;if(!key)return;
      const cfg=getCfg(key);
      openIconEditor(cfg.icon||'',async val=>{
        setCfg(key,{icon:val||undefined});
        if(!val)delete(S.folderConfig[key]||{}).icon;
        await doSave();renderGrid();
      });
    });
  });

  // crumb navigation
  el.querySelectorAll('[data-go]').forEach(c=>c.addEventListener('click',()=>{S.folderPath=JSON.parse(c.dataset.go);renderGrid()}));

  // item card clicks (in level 3)
  el.querySelectorAll('.card').forEach(c=>c.addEventListener('click',()=>openSheet(c.dataset.id)));
}

// ── Stats view ────────────────────────────────────────────────────────────────
function renderStats(){
  const el=document.getElementById('v-stats');if(!el)return;
  const SPEED=250;
  const fin={
    all:S.items,
    books:S.items.filter(x=>x.type==='book'),
    ff:S.items.filter(x=>x.type==='ff'&&!x.oneshot),
    oneshot:S.items.filter(x=>x.type==='ff'&&x.oneshot),
  };
  const cat=S.statsCat;const items=fin[cat];
  const totalCount=items.length;
  const totalWords=items.reduce((s,x)=>s+itemWords(x)*readMult(x),0);
  const totalMins=totalWords/SPEED;
  const summary=`<div class="ssum"><div class="stile"><div class="stile-n">${totalCount}</div><div class="stile-l">Items</div></div><div class="stile"><div class="stile-n">${fmtN(totalWords)}</div><div class="stile-l">Words</div></div><div class="stile"><div class="stile-n">${fmtTime(totalMins)}</div><div class="stile-l">Time*</div></div></div>`;
  let breakdown='';
  if(cat==='all'&&totalWords>0){
    const parts=[{lbl:'📚 Books',cls:'green',list:fin.books},{lbl:'📖 Fanfic',cls:'purple',list:fin.ff},{lbl:'📄 One-shots',cls:'amber',list:fin.oneshot}].filter(p=>p.list.length>0);
    const rows=parts.map(p=>{const w=p.list.reduce((s,x)=>s+itemWords(x)*readMult(x),0);const pct=Math.round(w/totalWords*100);return`<div class="sbrow"><span class="sbdot ${p.cls}"></span><span class="sblbl">${p.lbl}</span><span class="sbstat">${p.list.length} · ${fmtN(w)}w</span><span class="sbpct">${pct}%</span></div>`}).join('');
    const segs=parts.map(p=>{const w=p.list.reduce((s,x)=>s+itemWords(x)*readMult(x),0);return`<div class="sbseg ${p.cls}" style="width:${Math.round(w/totalWords*100)}%"></div>`}).join('');
    breakdown=`<div class="sbreak">${rows}<div class="sbbar">${segs}</div></div>`;
  }
  function getPeriodData(items2,period){
    const now=new Date();const DAY=86400000;
    const MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const dated=readEvents(items2);
    if(period==='week')return Array.from({length:7},(_,i)=>{const d=new Date(now-(6-i)*DAY);d.setHours(0,0,0,0);const e=new Date(d);e.setHours(23,59,59,999);return{label:i===6?'Today':['Su','Mo','Tu','We','Th','Fr','Sa'][d.getDay()],events:dated.filter(ev=>{const t=new Date(ev.date);return t>=d&&t<=e})}});
    if(period==='month')return Array.from({length:4},(_,i)=>{const e=new Date(now-(3-i)*7*DAY);e.setHours(23,59,59,999);const s=new Date(e-6*DAY);s.setHours(0,0,0,0);return{label:`${MO[s.getMonth()]} ${s.getDate()}`,events:dated.filter(ev=>{const t=new Date(ev.date);return t>=s&&t<=e})}});
    if(period==='year')return Array.from({length:12},(_,i)=>{const d=new Date(now.getFullYear(),now.getMonth()-(11-i),1);const s=new Date(d.getFullYear(),d.getMonth(),1);const e=new Date(d.getFullYear(),d.getMonth()+1,0,23,59,59,999);return{label:MO[d.getMonth()],events:dated.filter(ev=>{const t=new Date(ev.date);return t>=s&&t<=e})}});
    if(!dated.length)return[{label:String(now.getFullYear()),events:[]}];
    const years=[...new Set(dated.map(ev=>new Date(ev.date).getFullYear()))].sort();
    if(!years.includes(now.getFullYear()))years.push(now.getFullYear());
    return years.map(yr=>({label:String(yr),events:dated.filter(ev=>new Date(ev.date).getFullYear()===yr)}));
  }
  const groups=getPeriodData(items,S.statsPeriod);
  const metricFn=S.statsMetric==='words'?g=>g.events.reduce((s,ev)=>s+ev.words,0):g=>g.events.length;
  const values=groups.map(metricFn);const maxVal=Math.max(...values,1);
  const bars=groups.map((g,i)=>{
    const val=values[i];const pct=val>0?Math.max(val/maxVal*100,4):0;const lbl=S.statsMetric==='words'?fmtN(val):String(val);
    return`<div class="scol" style="flex:1;min-width:20px"><div class="sbar-v">${val>0?lbl:''}</div><div class="sbar-wrap"><div class="sbar${val===0?' empty':''}" style="height:${pct}%;width:100%"></div></div><div class="sbar-lbl">${g.label}</div></div>`;
  }).join('');
  const tab=(id,lbl)=>`<span class="stab${cat===id?' on':''}" data-scat="${id}">${lbl}</span>`;
  const pb=(id,lbl)=>`<button class="spbtn${S.statsPeriod===id?' on':''}" data-speriod="${id}">${lbl}</button>`;
  const mb=(id,lbl)=>`<button class="smbtn${S.statsMetric===id?' on':''}" data-smetric="${id}">${lbl}</button>`;
  el.innerHTML=`<div class="stat-tabs">${tab('all','All')}${tab('books','📚 Books')}${tab('ff','📖 FF')}${tab('oneshot','📄 One-shots')}</div>${summary}${breakdown}<div class="strend-hdr"><span class="strend-ttl">Reading trend</span><div class="sctrl-row">${pb('week','Week')}${pb('month','Month')}${pb('year','Year')}${pb('ever','All time')}</div></div><div class="sctrl-row" style="padding:0 16px 8px;gap:6px">${mb('words','Words')}${mb('items','Items')}</div><div class="schart">${bars}</div><div class="schart-base"></div><div class="snote">* ~250 words/min; books without word count use 250 words/page</div>`;
  el.querySelectorAll('[data-scat]').forEach(e=>e.addEventListener('click',()=>{S.statsCat=e.dataset.scat;renderStats()}));
  el.querySelectorAll('[data-speriod]').forEach(e=>e.addEventListener('click',()=>{S.statsPeriod=e.dataset.speriod;renderStats()}));
  el.querySelectorAll('[data-smetric]').forEach(e=>e.addEventListener('click',()=>{S.statsMetric=e.dataset.smetric;renderStats()}));
}

// ── Sheet ─────────────────────────────────────────────────────────────────────
function openSheet(id){
  const x=S.items.find(i=>i.id===id);if(!x)return;
  S.selId=id;
  const isFf=x.type==='ff';
  const rc=timesRead(x);
  const sub=isFf?`${x.author||'—'}${x.fandom?' · '+x.fandom:''}`:`${x.author||'—'}${x.genre?' · '+x.genre:''}`;
  const chips=STATUS.map(s=>`<span class="st-chip${x.status===s?' a-'+s:''}" data-s="${esc(s)}">${s}</span>`).join('');
  const stars=[1,2,3,4,5].map(i=>`<span class="s-star${i<=(x.userRating||0)?' on':''}" data-v="${i}">★</span>`).join('');
  const info=[];

function closeSheet(){

async function qSave(up){
  const idx=S.items.findIndex(i=>i.id===up.id);if(idx<0)return;
  up._modAt=new Date().toISOString();   // stamp edit time so sync prefers this version
  S.items[idx]=up;renderLibrary();renderStatRow();openSheet(up.id);await doSave();
}

function snapEdit(){
  const g=id=>document.getElementById(id)?.value??null;const p={};
  [['f-title','title'],['f-author','author'],['f-url','url'],['f-fandom','fandom'],['f-pairing','pairing'],['f-genre','genre'],['f-section','section'],['f-notes','notes'],['f-status','status'],['f-rating','rating']].forEach(([id,k])=>{const v=g(id);if(v!==null)p[k]=v.trim()});
  const w=g('f-words');if(w)p.words=parseInt(w)||null;
  const h=g('f-hearts');if(h)p.hearts=parseInt(h)||null;
  const pg=g('f-pages');if(pg)p.pages=parseInt(pg)||null;
  const rc=g('f-readcount');if(rc!==null)p.readCount=parseInt(rc)||0;
  S.editing={...S.editing,...p};
}

async function saveModal(){
  const title=document.getElementById('f-title')?.value.trim();
  if(!title){document.getElementById('f-title')?.focus();toast('Title is required','err');return}
  const g=id=>document.getElementById(id)?.value||'';
  const gN=id=>{const v=g(id);return v?parseInt(v)||null:null};
  const isFf=S.editing?.type==='ff';
  const st=g('f-status')||'TBR';
  const rc=g('f-readcount');
  const finV=g('f-finished');
  const item={
    ...(S.editing||{}),
    id:S.editing?.id||genId(),
    type:S.editing?.type||'ff',
    title,author:g('f-author').trim(),
    status:st,words:gN('f-words'),notes:g('f-notes').trim(),
    tags:[...S.mTags],userRating:S.mRating,
    favorite:g('f-fav')==='true',
    readCount:rc?parseInt(rc)||0:(S.editing?.readCount??(st==='Finished'?1:0)),
    finishedAt:finV?new Date(finV+'T12:00:00').toISOString():(st==='Finished'&&!S.editing?.finishedAt?new Date().toISOString():S.editing?.finishedAt||null),
    _addedAt:S.editing?._addedAt??S.items.length,
    _modAt:new Date().toISOString(),
  };
  if(isFf){item.url=g('f-url').trim();item.fandom=g('f-fandom').trim();item.pairing=g('f-pairing').trim();item.hearts=gN('f-hearts');item.rating=g('f-rating');item.oneshot=g('f-oneshot')==='true'}
  else{item.genre=g('f-genre').trim();item.section=g('f-section').trim();item.pages=gN('f-pages')}
  // Reconcile per-read timestamps with the chosen "times read" count.
  {
    const wantCount=rc!==''?Math.max(0,parseInt(rc)||0):(S.editing?.readCount??(st==='Finished'?1:0));
    const rdates=ensureReadDates(S.editing||{});
    if(wantCount>rdates.length){const fill=item.finishedAt||null;while(rdates.length<wantCount)rdates.push(fill)}
    else rdates.length=wantCount;
    item.readDates=rdates;item.readCount=rdates.length;
  }
  const idx=S.items.findIndex(i=>i.id===item.id);
  if(idx>=0)S.items[idx]=item;else S.items.unshift(item);
  closeModal();renderLibrary();renderStatRow();await doSave();
}

// ── Save to GitHub ─────────────────────────────────────────────────────────────
let saving=false;
async function doSave(){
  if(saving)return;saving=true;
  const syncBtn=document.getElementById('btn-sync');if(syncBtn)syncBtn.textContent='⏳';
  try{
    let sha=S.sha;
    if(!sha){const f=await ghLoad();sha=f.sha}
    S.sha=await ghSave(S.items,S.folderConfig,sha);toast('Saved ✓','ok');
  }catch(e){
    if(e.message==='conflict'){
      try{
        const f=await ghLoad();                                  // someone else (desktop) saved — merge, don't clobber
        const m=mergeLibrary(S.items,S.folderConfig,f.items,f.folderConfig);
        S.items=m.items;S.folderConfig=m.folderConfig;
        S.sha=await ghSave(S.items,S.folderConfig,f.sha);
        renderLibrary();renderStatRow();if(S.view==='grid')renderGrid();
        toast('Synced + saved ✓','ok');
      }
      catch(e2){toast('Save failed: '+e2.message,'err')}
    }else if(e.message==='invalid_token'){toast('Token invalid — tap ⚙️ to reset','err')}
    else{toast('Offline? Changes not saved','err')}
  }finally{saving=false;if(syncBtn)syncBtn.textContent='↻'}
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let tTimer=null;
function toast(msg,type='info'){
  const wrap=document.getElementById('toast-wrap');if(!wrap)return;
  wrap.innerHTML='';clearTimeout(tTimer);
  const bg={ok:'#166534',err:'#7f1d1d',info:'#312e81'}[type]||'#312e81';
  const ico={ok:'✅',err:'❌',info:'ℹ️'}[type]||'ℹ️';
  const el=document.createElement('div');
  el.className='toast-el';
  el.innerHTML=`${ico} ${msg}`;
  el.style.background=bg;el.style.color='#fff';
  wrap.appendChild(el);
  tTimer=setTimeout(()=>{wrap.innerHTML=''},3000);
}

// ── View switching ─────────────────────────────────────────────────────────────
function switchView(v){
  S.view=v;
  document.querySelectorAll('.bnav-item').forEach(t=>t.classList.toggle('on',t.dataset.view===v));
  const vl=document.getElementById('v-library');
  const vg=document.getElementById('v-grid');
  const vs=document.getElementById('v-stats');
  const fab=document.getElementById('fab');
  if(v==='library'){
    vl.style.display='flex';vg.style.display='none';vs.style.display='none';
    fab.classList.remove('hidden');renderLibrary();renderStatRow();
  }else if(v==='grid'){
    vl.style.display='none';vg.style.display='flex';vs.style.display='none';
    fab.classList.remove('hidden');S.folderPath=[];renderGrid();
  }else{
    vl.style.display='none';vg.style.display='none';vs.style.display='block';
    fab.classList.add('hidden');renderStats();
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init(){
  if(!tok()){showSetup();return}
  showApp();S.loading=true;renderLibrary();
  try{
    const r=await ghLoad();
    S.items=r.items;S.sha=r.sha;
    // Merge: remote folderConfig wins for any key not already set locally
    S.folderConfig={...r.folderConfig,...S.folderConfig};
    S.loading=false;renderStatRow();switchView('grid');  // open to Browse by default
  }catch(e){
    S.loading=false;
    if(e.message==='invalid_token'){toast('Token invalid','err');setTimeout(showSetup,1200)}
    else{document.getElementById('main').innerHTML=`<div class="empty"><div class="empty-ico">⚠️</div><div class="empty-txt">Couldn't load</div><div class="empty-sub">${esc(e.message)}</div></div>`}
  }
}
function showSetup(){document.getElementById('setup').classList.remove('hidden');document.getElementById('app').classList.add('hidden')}
function showApp(){document.getElementById('setup').classList.add('hidden');document.getElementById('app').classList.remove('hidden')}

// ── Events ────────────────────────────────────────────────────────────────────

// Setup
document.getElementById('s-btn').addEventListener('click',async()=>{
  const t=document.getElementById('pat-in').value.trim();if(!t)return;
  const errEl=document.getElementById('setup-err');errEl.textContent='';errEl.style.display='none';
  document.getElementById('s-btn').textContent='Connecting…';
  try{localStorage.setItem('gh_token',t);const r=await ghLoad();S.items=r.items;S.sha=r.sha;S.folderConfig=r.folderConfig||{};showApp();renderStatRow();switchView('grid')}
  catch(e){localStorage.removeItem('gh_token');errEl.style.display='block';errEl.textContent=e.message==='invalid_token'?'❌ Token invalid or missing repo access':'❌ '+e.message;document.getElementById('s-btn').textContent='Connect Library →'}
});
document.getElementById('pat-in').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('s-btn').click()});

// Bottom nav
document.querySelectorAll('.bnav-item').forEach(t=>t.addEventListener('click',()=>switchView(t.dataset.view)));

// Filter chips
document.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>{
  document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
  c.classList.add('on');S.filter=c.dataset.f;renderLibrary();
}));

// Search & sort
document.getElementById('search-in').addEventListener('input',e=>{S.search=e.target.value;renderLibrary()});
document.getElementById('sort-sel').addEventListener('change',e=>{S.sortBy=e.target.value;renderLibrary()});

// FAB
document.getElementById('fab').addEventListener('click',()=>openModal(null));

// Sheet: shade tap + swipe-to-dismiss
const shadeEl=document.getElementById('shade');
function shadeClose(e){e.preventDefault();closeSheet()}
shadeEl.addEventListener('click',shadeClose);
shadeEl.addEventListener('touchend',e=>{if(e.target===shadeEl)shadeClose(e)},{passive:false});

// Sheet: dedicated close button
document.getElementById('sh-close-btn').addEventListener('click',closeSheet);

// Sheet: swipe down to dismiss
const sheetEl=document.getElementById('sheet');
let _sheetTouchY=0;
sheetEl.addEventListener('touchstart',e=>{_sheetTouchY=e.touches[0].clientY},{passive:true});
sheetEl.addEventListener('touchend',e=>{
  const delta=e.changedTouches[0].clientY-_sheetTouchY;
  if(delta>80&&sheetEl.scrollTop<=0)closeSheet();
},{passive:true});

// Modal: back button
document.getElementById('m-cancel').addEventListener('click',closeModal);
document.getElementById('m-save').addEventListener('click',saveModal);

// Modal: swipe down to close
const modalEl=document.getElementById('modal');
let _modalTouchY=0;
modalEl.addEventListener('touchstart',e=>{_modalTouchY=e.touches[0].clientY},{passive:true});
modalEl.addEventListener('touchend',e=>{
  const delta=e.changedTouches[0].clientY-_modalTouchY;
  const scroll=modalEl.querySelector('.m-scroll');
  if(delta>90&&(scroll?scroll.scrollTop:0)<=0)closeModal();
},{passive:true});

// Sync
document.getElementById('btn-sync').addEventListener('click',async()=>{
  document.getElementById('btn-sync').textContent='⏳';
  try{
    const r=await ghLoad();
    S.items=r.items;S.sha=r.sha;
    S.folderConfig={...r.folderConfig,...S.folderConfig};
    renderLibrary();renderStatRow();
    if(S.view==='stats')renderStats();
    if(S.view==='grid')renderGrid();
    toast('Synced ✓','ok');
  }catch(e){toast('Sync failed','err')}
  finally{document.getElementById('btn-sync').textContent='↻'}
});

// Settings
document.getElementById('btn-settings').addEventListener('click',()=>{
  const t=tok()||'';const masked=t?t.slice(0,8)+'…'+t.slice(-4):'not set';
  if(confirm(`Token: ${masked}\n\nTap OK to change it.`)){localStorage.removeItem('gh_token');showSetup()}
});

// Icon editor events
document.getElementById('ish-in').addEventListener('input',e=>_updateIshPreview(e.target.value));
document.getElementById('ish-save').addEventListener('click',()=>{
  const val=document.getElementById('ish-in').value.trim();
  if(_iconCb)_iconCb(val);
  closeIconEditor();
});
document.getElementById('ish-close').addEventListener('click',closeIconEditor);
document.getElementById('icon-shade').addEventListener('click',closeIconEditor);

// Quick emoji buttons
(function(){
  const grid=document.getElementById('ish-emojis');
  grid.innerHTML=QUICK_EMOJIS.map(e=>`<div class="ish-e">${e}</div>`).join('');
  grid.querySelectorAll('.ish-e').forEach(el=>el.addEventListener('click',()=>{
    document.getElementById('ish-in').value=el.textContent;
    _updateIshPreview(el.textContent);
  }));
})();

init();
</script>
</body>
</html>
